<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puro Sabor | Iniciar Sesión Administrativa</title>
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body class="admin-login-body">

  <div class="login-wrapper animate-fade-in-up">
    <div class="login-container">
      <div class="login-header">
        <span class="login-logo">🔥</span>
        <h2>Puro Sabor</h2>
        <p>PANEL DE ADMINISTRACIÓN</p>
      </div>

      <div id="login-alert" class="alert-box error" style="display: none;"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <div class="input-with-icon">
            <span class="input-icon">👤</span>
            <input type="text" id="username" placeholder="Ingresa tu usuario" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-with-icon">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-submit-login">
          <span>Ingresar al Panel</span>
        </button>
      </form>
      
      <div class="login-footer">
        <a href="/" class="back-to-menu">← Volver al Menú Público</a>
      </div>
    </div>
  </div>

  <script src="/admin/js/auth.js"></script>
</body>
</html>
